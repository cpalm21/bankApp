name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    environment:
      name: preview
      url: ${{ steps.set-url.outputs.preview_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Set Preview URL
        id: set-url
        run: |
          echo "preview_url=https://example.com" >> $GITHUB_OUTPUT
